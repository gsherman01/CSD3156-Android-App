<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Cloud Platform</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      body { font-family: Arial, sans-serif; margin: 0; }
      #toolbar { padding: 12px; background: #f5f5f5; display: flex; gap: 8px; align-items: center; }
      #map { height: calc(100vh - 64px); }
      #status { min-width: 300px; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <input type="file" id="geojsonFile" accept=".geojson,.json" />
      <button id="uploadBtn">Upload</button>
      <button id="bufferBtn">Buffer (0.01)</button>
      <button id="nearestBtn">Nearest</button>
      <span id="status">Ready.</span>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
